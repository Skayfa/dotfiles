[window]
padding = { x = 10, y = 10 }
decorations = "none"
option_as_alt = "Both"          # utile pour les raccourcis sur clavier mac

[font]
size = 14.0
normal = { family = "JetBrainsMono Nerd Font Mono", style = "Regular" }
bold = { family = "JetBrainsMono Nerd Font Mono", style = "Bold" }
italic = { family = "JetBrainsMono Nerd Font Mono", style = "Italic" }

[scrolling]
history = 10000

[selection]
save_to_clipboard = true
# --- Hints : ⌘+clic (ou Ctrl+Shift+…) pour ouvrir chemins/URLs ---
[hints]
alphabet = "jfkdls;ahgurieowpq"

# URLs -> ouverture macOS par défaut
[[hints.enabled]]
regex = '(https?|ftp|file|ssh|git)://\S+'
hyperlinks = true
post_processing = true
mouse = { enabled = true, mods = "Command" }
binding = { key = "U", mods = "Control|Shift" }
command = "open"

# Fichiers (absolus, ~, ou relatifs) -> Zed ; le wrapper résout ~ et le cwd du pane tmux
[[hints.enabled]]
regex = '~?[A-Za-z0-9._-]*/[A-Za-z0-9._/-]+(:[0-9]+)?(:[0-9]+)?'
post_processing = true
persist = false
mouse = { enabled = true, mods = "Command" }
binding = { key = "O", mods = "Control|Shift" }
command = "__HOME__/.local/bin/zed-open"

# --- Bindings clavier ---
[keyboard]
bindings = [
  # Cmd+b -> prefixe tmux (Ctrl-b, 0x02)
  { key = "B", mods = "Command", chars = "\u0002" },
  # Shift+Entree -> saut de ligne dans Claude Code CLI
  { key = "Return", mods = "Shift", chars = "\n" },
]

# --- Couleurs : palette Everforest Dark (sombre, bon contraste, lisible) ---
# Fix lisibilité : normal.black DOIT différer de primary.background, sinon le
# texte ANSI "noir" des TUIs (Claude Code, etc.) devient invisible (noir sur noir).
[colors.primary]
background = "#2d353b"
foreground = "#d3c6aa"

[colors.normal]
black   = "#475258"
red     = "#e67e80"
green   = "#a7c080"
yellow  = "#dbbc7f"
blue    = "#7fbbb3"
magenta = "#d699b6"
cyan    = "#83c092"
white   = "#d3c6aa"

[colors.bright]
black   = "#5c6a72"
red     = "#e67e80"
green   = "#a7c080"
yellow  = "#dbbc7f"
blue    = "#7fbbb3"
magenta = "#d699b6"
cyan    = "#83c092"
white   = "#fdf6e3"
