# Souris : cliquer pour changer de pane, scroller, redimensionner
set -g mouse on

# Historique de scroll plus profond
set -g history-limit 50000

# Numérotation à partir de 1 (au lieu de 0)
set -g base-index 1
setw -g pane-base-index 1

# Splits plus intuitifs : | vertical, - horizontal
bind v split-window -h
bind s split-window -v
unbind '"'
unbind %

# Recharger la config sans quitter tmux : préfixe + r
bind r source-file ~/.tmux.conf \; display "Config rechargée"

# Navigation entre panes avec préfixe + flèches
bind Left select-pane -L
bind Right select-pane -R
bind Up select-pane -U
bind Down select-pane -D

# Couleurs correctes (important pour Alacritty + p10k)
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",alacritty:Tc"

# lazygit du projet courant en popup overlay (rapide, se ferme à la sortie) : préfixe + g
bind g display-popup -E -w 90% -h 90% -d "#{pane_current_path}" lazygit
# lazygit du projet courant dans une fenêtre tmux persistante : préfixe + G
bind G new-window -c "#{pane_current_path}" -n lazygit lazygit
# lazysql (bases de données) en popup overlay : préfixe + D
bind D display-popup -E -w 90% -h 90% lazysql
# hunk (review du diff courant) en popup overlay : préfixe + h
# Pour suivre un agent qui édite : split (préfixe v) puis `hd --watch`.
bind h display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "hunk diff"

# ===================== DESIGN — Powerline cyan =====================
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=#181825,fg=#cdd6f4"

# gauche : nom de session
set -g status-left-length 40
set -g status-left "#[fg=#11111b,bg=#00d7ff,bold]   #S #[fg=#00d7ff,bg=#181825]#[default]"

# liste des fenêtres
set -g window-status-separator ""
set -g window-status-format "#[fg=#6c7086,bg=#181825]  #I #W "
set -g window-status-current-format "#[fg=#00d7ff,bg=#181825]#[fg=#11111b,bg=#00d7ff,bold] #I #W #[fg=#00d7ff,bg=#181825]#[default]"

# droite : date + heure
set -g status-right-length 60
set -g status-right "#[fg=#313244,bg=#181825]#[fg=#cdd6f4,bg=#313244]  %d/%m #[fg=#00d7ff,bg=#313244]#[fg=#11111b,bg=#00d7ff,bold]  %H:%M #[default]"

# bordures de panes
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#00d7ff"

# messages + mode copie
set -g message-style "bg=#00d7ff,fg=#11111b,bold"
set -g mode-style "bg=#00d7ff,fg=#11111b"

# activité des fenêtres
setw -g monitor-activity on
set -g visual-activity off

# ===================== NAVIGATION FLUIDE =====================
# Panes : ⌥ + flèches (SANS préfixe) — ⌥hjkl rendu à nvim (terminaux NvChad)
bind -n M-Left  select-pane -L
bind -n M-Down  select-pane -D
bind -n M-Up    select-pane -U
bind -n M-Right select-pane -R

# Fenêtres : Shift + flèches (SANS préfixe)
bind -n S-Left  previous-window
bind -n S-Right next-window

# Redimensionner les panes : préfixe + H/J/K/L (répétable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Aide-mémoire perso : préfixe + ?
# Chemin en '~' : ce fichier est LIÉ au repo, donc jamais passé au sed d'install.sh.
# tmux exécute la commande via /bin/sh, qui étend le ~. Ne pas y remettre de placeholder.
bind ? display-popup -E -w 80% -h 80% "less -R ~/.config/tmux/cheatsheet.txt"

# ===================== ÉCHANGER DES PANES =====================
# préfixe + Ctrl + h/j/k/l : échanger le pane courant avec son voisin (direction)
bind -r C-h swap-pane -t '{left-of}'
bind -r C-j swap-pane -t '{down-of}'
bind -r C-k swap-pane -t '{up-of}'
bind -r C-l swap-pane -t '{right-of}'
# bonus : faire tourner tous les panes
bind -r C-o rotate-window

# ===================== QoL (revue dotfiles) =====================
set -sg escape-time 10          # plus de lag sur Échap dans nvim
set -g focus-events on          # autoread nvim / events focus
set -g renumber-windows on      # renumérote les fenêtres après fermeture
setw -g mode-keys vi            # navigation vi en mode copie
# copie -> presse-papier macOS
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy'
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel 'pbcopy'
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'pbcopy'
