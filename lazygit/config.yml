# lazygit — palette GitHub, accordée à hunk (theme = github-light-default).
#
# Pourquoi PAS les couleurs de GitHub Light ici : lazygit ne peint pas son fond,
# il hérite de celui du terminal (Everforest Dark #2d353b). Sur ce fond, les
# couleurs de GitHub Light plafonnent à ~2.4 de contraste (illisible, cf. le bug
# "noir sur noir" corrigé en 8bb4e93), et son fond de sélection #ddf4ff tombe à
# 1.49 avec le texte clair. On garde donc la MÊME palette de marque, mais ses
# variantes sombres : ~4.9 de contraste. defaultFgColor reste `default` = le
# texte du terminal, jamais une couleur en dur.
gui:
  border: rounded
  showFileTree: true
  showPanelJumps: true
  nerdFontsVersion: "3"        # icônes Nerd Font
  theme:
    activeBorderColor:
      - "#58a6ff"             # panneau ACTIF : bleu GitHub
      - bold
    inactiveBorderColor:
      - "#8b949e"             # panneaux inactifs : gris discret (contraste volontairement bas)
    searchingActiveBorderColor:
      - "#58a6ff"
      - bold
    optionsTextColor:
      - "#58a6ff"             # barre d'aide en bas
    selectedLineBgColor:
      - "#0a3069"             # ligne sélectionnée : bleu GitHub profond (texte lisible dessus)
    selectedRangeBgColor:
      - "#0a3069"
    cherryPickedCommitFgColor:
      - "#58a6ff"
    cherryPickedCommitBgColor:
      - "#30363d"
    markedBaseCommitFgColor:
      - "#d29922"             # jaune GitHub
    unstagedChangesColor:
      - "#ff7b72"             # changements non-stagés : rouge GitHub
    defaultFgColor:
      - default

# Cycle des onglets d'un panneau (Files <-> Worktrees <-> Submodules, etc.)
# Defaults '[' / ']' inutilisables en AZERTY Mac (option_as_alt). Ctrl+h = Backspace
# dans Alacritty, donc prevTab -> Ctrl+a ("arrière"), nextTab -> Ctrl+l.
keybinding:
  universal:
    prevTab: "<c-a>"
    nextTab: "<c-l>"
